<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUDTV - ĐÀI TRUYỀN HÌNH SINH HỌC ỨNG DỤNG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --main-blue: #0066FF; --bg-light: #F0F5FF; }
        body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; }
        .blue-gradient { background: linear-gradient(135deg, #0066FF 0%, #00CCFF 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(0, 102, 255, 0.1); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--main-blue); border-radius: 10px; }
        #admin-panel { display: none; z-index: 9999; }
        .post-img { max-height: 500px; object-fit: cover; width: 100%; }
        
        /* Ẩn mặc định nút quản trị để bảo mật */
        #admin-trigger-btn { display: none; }
    </style>
</head>
<body class="custom-scroll">

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md border-b border-blue-100 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 blue-gradient rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-bold">SH</span>
                </div>
                <div>
                    <h1 class="text-blue-600 font-bold leading-none text-lg">SHUDTV</h1>
                    <p class="text-[8px] text-gray-500 uppercase tracking-widest mt-1">Đài truyền hình Sinh học ứng dụng</p>
                </div>
            </div>
            
            <button id="admin-trigger-btn" onclick="toggleAdmin()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-sm font-semibold hover:bg-blue-700 transition shadow-md">
                Quản trị
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-8 px-4">
        <div id="news-feed" class="space-y-8">
            </div>
    </main>

    <div id="admin-panel" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl transition-all">
            <div class="blue-gradient p-6 text-white flex justify-between items-center">
                <h2 class="text-xl font-bold">Bảng Điều Khiển Hệ Thống</h2>
                <button onclick="toggleAdmin()" class="text-2xl opacity-80 hover:opacity-100">&times;</button>
            </div>
            <div class="p-6 space-y-4">
                <input id="post-title" type="text" placeholder="Tiêu đề bản tin..." class="w-full p-4 border-2 border-blue-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <textarea id="post-content" rows="4" placeholder="Nội dung chi tiết..." class="w-full p-4 border-2 border-blue-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <input id="post-media" type="text" placeholder="Link ảnh hoặc video (URL)..." class="w-full p-4 border-2 border-blue-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <select id="post-type" class="w-full p-4 border-2 border-blue-100 rounded-2xl outline-none bg-white">
                    <option value="image">Định dạng: Hình ảnh</option>
                    <option value="video">Định dạng: Video</option>
                </select>
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="addPost()" class="blue-gradient text-white py-4 rounded-2xl font-bold shadow-lg hover:scale-[1.02] transition">ĐĂNG TIN</button>
                    <button onclick="exportData()" class="bg-orange-400 text-white py-4 rounded-2xl font-bold shadow-lg hover:scale-[1.02] transition">XUẤT DỮ LIỆU</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // KIỂM TRA QUYỀN TRUY CẬP (Chỉ hiện Admin cho máy chủ/máy gốc)
        function checkAdminAccess() {
            const isLocal = window.location.hostname === "localhost" || 
                            window.location.hostname === "127.0.0.1" || 
                            window.location.protocol === "file:";
            
            const adminBtn = document.getElementById('admin-trigger-btn');
            if (isLocal) {
                adminBtn.style.display = 'block'; // Hiện nút nếu là máy của ní
            } else {
                adminBtn.remove(); // Xóa hẳn nút nếu là máy người khác
            }
        }

        var db = { posts: [] };

        function render() {
            const feed = document.getElementById('news-feed');
            const isAdmin = document.getElementById('admin-trigger-btn') !== null;
            
            feed.innerHTML = db.posts.map((p, idx) => `
                <div class="glass-card p-6 rounded-[20px] shadow-sm border border-blue-100 hover:shadow-md transition-all">
                    <div class="flex justify-between items-start mb-3">
                        <p class="text-[10px] text-blue-400 font-bold uppercase tracking-tighter">PHÓNG SỰ TRỰC TIẾP • ${p.time}</p>
                        ${isAdmin ? `<button onclick="deletePost(${idx})" class="text-red-400 hover:text-red-600 text-xs">Xóa</button>` : ''}
                    </div>
                    <h2 class="text-xl font-bold text-blue-800 mb-3 leading-tight">${p.title}</h2>
                    <p class="text-gray-600 text-sm mb-5 whitespace-pre-wrap leading-relaxed">${p.content}</p>
                    ${p.media ? (p.type === 'video' ? `<video src="${p.media}" controls class="w-full rounded-2xl shadow-inner bg-black"></video>` : `<img src="${p.media}" class="post-img rounded-2xl shadow-md border">`) : ''}
                </div>
            `).join('');
            if(db.posts.length === 0) {
                feed.innerHTML = '<div class="text-center py-20 text-gray-400 italic">Chưa có bản tin nào được cập nhật...</div>';
            }
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
        }

        function addPost() {
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const media = document.getElementById('post-media').value;
            const type = document.getElementById('post-type').value;

            if(!title || !content) return alert("Ní ơi, nhập thiếu tiêu đề hoặc nội dung kìa!");

            db.posts.unshift({
                title, content, media, type,
                time: new Date().toLocaleString('vi-VN')
            });

            render();
            toggleAdmin();
            // Reset form
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
            document.getElementById('post-media').value = '';
        }

        function deletePost(i) {
            if(confirm("Xóa bản tin này hả ní?")) {
                db.posts.splice(i, 1);
                render();
            }
        }

        function exportData() {
            const html = document.documentElement.outerHTML;
            const dataStr = `var db = ${JSON.stringify(db)};`;
            const final = html.replace(/var db = \{.*\};/, dataStr);
            const blob = new Blob([final], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'shudtv_update.html';
            a.click();
        }

        // Khởi chạy khi load trang
        window.onload = () => {
            checkAdminAccess();
            render();
        };
    </script>
</body>
</html>
